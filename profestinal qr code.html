<!DOCTYPE html>
<html>
<head>
<title>Professional QR Code Generator</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f4f6f8;
text-align:center;
padding-top:60px;
}

.container{
background:white;
width:350px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0px 0px 10px rgba(0,0,0,0.1);
}

input{
width:90%;
padding:10px;
font-size:16px;
margin-top:10px;
}

button{
padding:10px 20px;
margin-top:10px;
font-size:16px;
cursor:pointer;
border:none;
border-radius:5px;
}

.generate{
background:#007bff;
color:white;
}

.download{
background:#28a745;
color:white;
}

#qrcode{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h2>QR Code Generator</h2>

<input type="text" id="text" placeholder="Enter link or text">

<br>

<button class="generate" onclick="generateQR()">Generate</button>

<br>

<div id="qrcode"></div>

<br>

<button class="download" onclick="downloadQR()">Download QR</button>

</div>

<script>

function generateQR(){

document.getElementById("qrcode").innerHTML="";

var text=document.getElementById("text").value;

new QRCode(document.getElementById("qrcode"),{
text:text,
width:200,
height:200
});

}

function downloadQR(){

var img=document.querySelector("#qrcode img");

if(!img){
alert("Generate QR Code first");
return;
}

var link=document.createElement("a");
link.href=img.src;
link.download="qrcode.png";
link.click();

}

</script>

</body>
</html>
